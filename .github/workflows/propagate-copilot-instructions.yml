name: Propagate Copilot Instructions
# Propagates Copilot instruction files to all other Cratis repositories.
#
# Requires a PAT stored as the PAT_WORKFLOWS organisation secret with:
#   Classic PAT:       repo + workflow scopes
#   Fine-grained PAT:  Contents (read/write) + Pull requests (read/write)
#                      + Workflows (read/write)
#                      for ALL repositories in the Cratis organisation
#
# Files excluded from propagation are listed in .github/.copilot-sync-ignore.
# Agent definition files (.github/agents/**) are excluded there because they
# are repository-specific and confidential.

on:
  push:
    branches: ["main"]
    paths:
      - ".github/copilot-instructions.md"
      - ".github/instructions/**"
      - ".github/skills/**"
      - ".github/prompts/**"
      - ".github/hooks/**"
      - ".github/.copilot-sync-ignore"
  workflow_dispatch:

jobs:
  propagate:
    uses: Cratis/Workflows/.github/workflows/propagate-copilot-instructions.yml@main
    with:
      event_name: ${{ github.event_name }}
    secrets: inherit
